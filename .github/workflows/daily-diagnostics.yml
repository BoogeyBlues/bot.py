name: Daily Bot Diagnostics & Auto-Repair

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

permissions:
  contents: write
  id-token: write           # required by claude-code-action for GitHub OIDC auth

jobs:
  diagnose-and-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt --quiet

      - name: Baseline syntax check (before)
        run: |
          echo "=== BEFORE ==="
          python -m py_compile bot.py && echo "bot.py OK" || echo "bot.py FAIL"

      - name: Claude diagnostic and auto-repair
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash,Read,Edit,Write,Grep,Glob"
          direct_prompt: |
            You are running daily diagnostics on the PumpFun sniper bot in this repository.
            The only file to check and repair is bot.py. Do NOT touch any other file.
            Fix every issue you find. Make no changes if nothing is wrong.

            FILE: bot.py — PumpFun sniper bot (Flask, ~4100 lines)

            CHECKS TO RUN:

            1. SYNTAX — run: python -m py_compile bot.py

            2. UNDEFINED VARIABLES — any variable used before it is assigned in the
               same scope (especially in loops and background threads)

            3. THREAD SAFETY — shared mutable state accessed without the correct lock:
               Locks: capital_lock (capital), trades_lock (open_trades),
                 log_lock (completed_trades, trade_log), _daily_lock (_daily_*),
                 _copy_lock (_copy_wallets, _copied_mints, _sold_mints),
                 _signal_lock (all _gmgn_* sets), usdc_lock (usdc_locked)
               Lock ordering rule: capital_lock ALWAYS acquired before _daily_lock

            4. FLASK ROUTES — every @app.route handler:
               - Must return a value (None → 500)
               - Must not iterate shared lists/dicts without their lock
               - Must handle None returns from helper functions

            5. BACKGROUND THREADS — every while True loop:
               - Must have a broad try/except so one bad tick doesn't kill the thread
               - Must not hold a lock while doing network I/O

            6. LOGIC BUGS — wrong comparisons, off-by-ones, values used after
               they could be None, silent exception swallowing that hides real errors

            7. IMPORT ERRORS — any import that could fail at runtime

            After all fixes run python -m py_compile bot.py and confirm clean.
            Do NOT change working logic, refactor, or add features — correctness fixes only.

      - name: Confirm syntax clean (after)
        run: |
          echo "=== AFTER ==="
          python -m py_compile bot.py && echo "bot.py OK" || (echo "bot.py STILL BROKEN" && exit 1)

      - name: Commit and push repairs
        run: |
          git config user.name  "BoogeyBot Auto-Repair"
          git config user.email "autorepair@noreply.github.com"
          if git diff --quiet; then
            echo "Sniper bot healthy — no changes needed"
          else
            git add bot.py
            git commit -m "Auto-repair $(date +%Y-%m-%d): sniper bot diagnostic fixes"
            git push origin main
            echo "Fixes committed and pushed"
          fi
